kind: Deployment
metadata:
    annotations:
        deployment.kubernetes.io/revision: "1"
    generation: 1
    labels:
        app: frontend
    name: frontend
spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 3
    selector:
        matchLabels:
            app: frontend
    strategy:
        rollingUpdate:
            maxSurge: 25%
            maxUnavailable: 25%
        type: RollingUpdate
    template:
        metadata:
            creationTimestamp: null
            labels:
                app: frontend
                name: frontend
        spec:
            affinity:
                nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                        nodeSelectorTerms:
                            - matchExpressions:
                                  - key: node-role.kubernetes.io/cloud-container-g2
                                    operator: In
                                    values:
                                        - "true"
            containers:
                - image: hadias83/voting-frontend:v12
                  imagePullPolicy: IfNotPresent
                  name: frontend
                  ports:
                      - containerPort: 80
                        name: http
                        protocol: TCP
                  resources:
                      limits:
                          cpu: 300m
                          ephemeral-storage: 1G
                          memory: 600M
                      requests:
                          cpu: 300m
                          ephemeral-storage: 1G
                          memory: 600M
                  terminationMessagePath: /dev/termination-log
                  terminationMessagePolicy: File
            dnsPolicy: ClusterFirst
            restartPolicy: Always
            schedulerName: default-scheduler
            securityContext: {}
            terminationGracePeriodSeconds: 30
            tolerations:
                - effect: NoSchedule
                  key: role
                  operator: Equal
                  value: cloud-container-g2
---
kind: Service
metadata:
    labels:
        app: frontend
    name: frontend
spec:
    clusterIP: 10.102.98.68
    clusterIPs:
        - 10.102.98.68
    internalTrafficPolicy: Cluster
    ipFamilies:
        - IPv4
    ipFamilyPolicy: SingleStack
    ports:
        - name: http
          port: 80
          protocol: TCP
          targetPort: http
    selector:
        app: frontend
    sessionAffinity: None
    type: ClusterIP
---
kind: Ingress
metadata:
    generation: 1
    name: frontend-free-ingress
spec:
    ingressClassName: nginx
    rules:
        - host: frontend-df6d9a12ff-chorsi.apps.ir-central1.arvancaas.ir
          http:
              paths:
                  - backend:
                        service:
                            name: frontend
                            port:
                                number: 80
                    path: /
                    pathType: Prefix
